<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <style>
        /* Fondo negro para que resalten las fotos */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            text-align: center; 
        }
        /* Las fotos ocupan todo el ancho del celu y se apilan */
        img { 
            width: 100%; 
            max-width: 800px; 
            display: block; 
            margin: 0 auto; 
        }
    </style>
</head>
<body>
    <img src="menu1.jpg">
    <img src="menu2.jpg">
    <img src="menu3.jpg">
</body>
</html>
